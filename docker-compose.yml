name: kickstart-otel-lgtm

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:

services:
  # ─── OpenTelemetry Collector ────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    user: "0:0"  # root — needed to read /var/run/docker.sock for docker_stats receiver
    volumes:
      - ./otel-collector/config.yaml:/etc/otel/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro  # per docker_stats receiver
    ports:
      - "4317:4317"   # OTLP gRPC (collega le tue app qui)
      - "4318:4318"   # OTLP HTTP (collega le tue app qui)
      - "13133:13133" # health check
      - "55679:55679" # zPages (debug)
    networks:
      - observability
    depends_on:
      - loki
      - tempo
      - mimir

  # ─── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor metricsSummary
      - GF_UNIFIED_ALERTING_STATE_HISTORY_ENABLED=true
      - GF_UNIFIED_ALERTING_STATE_HISTORY_BACKEND=loki
      - GF_UNIFIED_ALERTING_STATE_HISTORY_LOKI_REMOTE_URL=http://loki:3100
      - GF_UNIFIED_ALERTING_STATE_HISTORY_LOKI_TENANT_ID=1
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-dashboards/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboards/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-dashboards/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./grafana-dashboards/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - loki
      - tempo
      - mimir

  # ─── Loki ───────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
    ports:
      - "3100:3100"
    networks:
      - observability

  # ─── Tempo ──────────────────────────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.10.4
    container_name: tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
    ports:
      - "3200:3200"   # Tempo query API (Grafana usa questa)
      # 4317 OTLP gRPC ingest è interno alla rete, non esposto all'host
    networks:
      - observability

  # ─── Mimir ──────────────────────────────────────────────────────────────────
  mimir:
    image: grafana/mimir:3.0.5
    container_name: mimir
    restart: unless-stopped
    command: ["--config.file=/etc/mimir/config.yaml"]
    volumes:
      - ./mimir/config.yaml:/etc/mimir/config.yaml:ro
    ports:
      - "9009:9009"
    networks:
      - observability
