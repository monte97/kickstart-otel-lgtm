receivers:
  # Telemetria dalle app via OTLP
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

  # Metriche container Docker (per Infrastructure dashboard)
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 15s
    timeout: 10s

  # Self-monitoring: scrape delle metriche interne del collector
  prometheus/self:
    config:
      scrape_configs:
        - job_name: otelcol
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1024

  # Aggiunge attributi di risorsa utili
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

exporters:
  # Log → Loki (richiede Loki 3.x per endpoint /otlp)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Trace → Tempo
  otlp/tempo:
    endpoint: grpc://tempo:4317
    tls:
      insecure: true

  # Metriche → Mimir via remote write
  prometheusremotewrite/mimir:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true  # converte resource attributes (container.name, ecc.) in label Prometheus

  # Debug: stampa telemetria nei log del collector (disabilitare in prod)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  telemetry:
    logs:
      level: warn
    metrics:
      level: detailed
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite/mimir]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp/loki]

    metrics/infra:
      receivers: [docker_stats, prometheus/self]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite/mimir]
