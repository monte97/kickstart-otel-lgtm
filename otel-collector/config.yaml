receivers:
  # Telemetria dalle app via OTLP
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

  # Metriche container Docker (per Infrastructure dashboard)
  docker_stats:
    endpoint: unix:///var/run/docker.sock
    collection_interval: 15s
    timeout: 10s

  # Self-monitoring: scrape delle metriche interne del collector
  prometheus/self:
    config:
      scrape_configs:
        - job_name: otelcol
          scrape_interval: 15s
          static_configs:
            - targets: ["localhost:8888"]

  # Metriche host (CPU, memoria, disco, rete) via Node Exporter
  prometheus/node:
    config:
      scrape_configs:
        - job_name: node-exporter
          scrape_interval: 15s
          static_configs:
            - targets: ["node-exporter:9100"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 1024

  # Aggiunge attributi di risorsa utili
  resourcedetection:
    detectors: [env, system]
    timeout: 5s
    override: false

  # Promuove trace_id e span_id a attributi stringa sui log record,
  # così Loki li indicizza e Grafana può correlare log → trace con un click.
  transform/logs_trace_context:
    log_statements:
      - context: log
        statements:
          - set(attributes["trace_id"], Hex(trace_id)) where Hex(trace_id) != "00000000000000000000000000000000"
          - set(attributes["span_id"], Hex(span_id)) where Hex(span_id) != "0000000000000000"

  # Tail sampling: decisione presa dopo aver raccolto tutti gli span della trace.
  # Policy valutate con OR: basta che una dica SAMPLED per mantenere la trace.
  #   1. keep-errors   → 100% delle trace con almeno uno span in errore
  #   2. keep-slow     → 100% delle trace con latenza > TRACE_LATENCY_THRESHOLD_MS
  #   3. sample-rest   → campionamento probabilistico sulle rimanenti (TRACE_SAMPLING_RATE %)
  tail_sampling:
    decision_wait: ${TRACE_DECISION_WAIT:-10s}
    num_traces: 50000
    policies:
      - name: keep-errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: keep-slow
        type: latency
        latency:
          threshold_ms: ${TRACE_LATENCY_THRESHOLD_MS:-2000}
      - name: sample-rest
        type: probabilistic
        probabilistic:
          sampling_percentage: ${TRACE_SAMPLING_RATE:-20}

exporters:
  # Log → Loki (richiede Loki 3.x per endpoint /otlp)
  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

  # Trace → Tempo
  otlp_grpc/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

  # Metriche → Mimir via remote write
  prometheusremotewrite/mimir:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true  # converte resource attributes (container.name, ecc.) in label Prometheus
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000

  # Debug: stampa telemetria nei log del collector (disabilitare in prod)
  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]

  telemetry:
    logs:
      level: warn
    metrics:
      level: detailed

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, resourcedetection, batch]
      exporters: [otlp_grpc/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite/mimir]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, transform/logs_trace_context, batch]
      exporters: [otlp_http/loki]

    metrics/infra:
      receivers: [docker_stats, prometheus/self, prometheus/node]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite/mimir]
