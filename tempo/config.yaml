server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
          # HTTP OTLP non serve: solo l'OTel Collector invia a Tempo, via gRPC

storage:
  trace:
    backend: local
    local:
      path: /tempo/blocks
    wal:
      path: /tempo/wal

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: ${TEMPO_BLOCK_RETENTION:-168h}

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tempo/generator/wal
    remote_write:
      - url: http://mimir:9009/api/v1/push
        send_exemplars: true
  traces_storage:
    path: /tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
      generate_native_histograms: both
