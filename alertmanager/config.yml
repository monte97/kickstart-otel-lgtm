global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'grafana_folder']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'null'
  routes:
    # Il Watchdog deve arrivare a un servizio esterno dead-man's-switch
    # (es. healthchecks.io, DeadMansSnitch) che notifica quando SMETTE di arrivare.
    - matchers:
        - alertname = "Watchdog"
      receiver: watchdog
      repeat_interval: 1m

receivers:
  - name: 'null'

  - name: watchdog
    # Decommenta e configura il tuo dead-man's-switch esterno:
    # webhook_configs:
    #   - url: 'https://hc-ping.com/YOUR-UUID-HERE'
    #     send_resolved: false

  # ── Esempi di receiver reali ──────────────────────────────────────────────
  #
  # - name: slack
  #   slack_configs:
  #     - api_url: 'https://hooks.slack.com/services/T.../B.../...'
  #       channel: '#alerts'
  #       title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
  #       text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
  #       send_resolved: true
  #
  # - name: email
  #   email_configs:
  #     - to: 'ops@example.com'
  #       from: 'alertmanager@example.com'
  #       smarthost: 'smtp.example.com:587'
  #       auth_username: 'alertmanager@example.com'
  #       auth_password: 'secret'
  #       send_resolved: true
  #
  # - name: pagerduty
  #   pagerduty_configs:
  #     - routing_key: 'YOUR_INTEGRATION_KEY'

inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ['alertname', 'service_name']
